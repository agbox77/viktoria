<script>
function mdToHtml(md) {
  if (!md) return '';
  
  const lines = md.split('\n');
  let html = '';
  let inList = false;

  for (let i = 0; i < lines.length; i++) {
    let line = lines[i];

    // Inline форматирование
    line = line
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.+?)\*/g, '<em>$1</em>')
      .replace(/\[(.+?)\]\((.+?)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');

    if (/^### (.+)/.test(line)) {
      if (inList) { html += '</ul>'; inList = false; }
      html += `<h3>${line.replace(/^### /, '')}</h3>`;
    } else if (/^## (.+)/.test(line)) {
      if (inList) { html += '</ul>'; inList = false; }
      html += `<h2>${line.replace(/^## /, '')}</h2>`;
    } else if (/^# (.+)/.test(line)) {
      if (inList) { html += '</ul>'; inList = false; }
      html += `<h2>${line.replace(/^# /, '')}</h2>`;
    } else if (/^> (.+)/.test(line)) {
      if (inList) { html += '</ul>'; inList = false; }
      html += `<blockquote>${line.replace(/^> /, '')}</blockquote>`;
    } else if (/^---$/.test(line)) {
      if (inList) { html += '</ul>'; inList = false; }
      html += '<hr>';
    } else if (/^- (.+)/.test(line)) {
      if (!inList) { html += '<ul>'; inList = true; }
      html += `<li>${line.replace(/^- /, '')}</li>`;
    } else if (line.trim() === '') {
      if (inList) { html += '</ul>'; inList = false; }
      // пустая строка = разделитель абзацев, не добавляем ничего
    } else {
      if (inList) { html += '</ul>'; inList = false; }
      html += `<p>${line}</p>`;
    }
  }
  if (inList) html += '</ul>';
  return html;
}

function parseFrontmatter(text) {
  const m = text.match(/^---\n([\s\S]*?)\n---\n?([\s\S]*)$/);
  if (!m) return null;
  const data = {};
  m[1].split('\n').forEach(line => {
    const ci = line.indexOf(':');
    if (ci < 1) return;
    let k = line.slice(0,ci).trim();
    let v = line.slice(ci+1).trim();
    if ((v.startsWith('"')&&v.endsWith('"'))||(v.startsWith("'")&&v.endsWith("'"))) v=v.slice(1,-1);
    if (v.startsWith('[')) { try{data[k]=JSON.parse(v.replace(/'/g,'"'));}catch{data[k]=[];} }
    else data[k]=v;
  });
  data.body = m[2].trim();
  return data;
}

function formatDate(str) {
  if (!str) return '';
  const parts = str.split(' ')[0];
  if (parts.includes('.')) {
    const [d,mo,y] = parts.split('.');
    const months=['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];
    return `${parseInt(d)} ${months[parseInt(mo)-1]} ${y}`;
  }
  return str;
}

const TYPE_MAP = {
  'Новость': {cls:'badge-news', icon:'📰'},
  'Статья':  {cls:'badge-article', icon:'📝'},
  'Анонс':   {cls:'badge-announce', icon:'📣'},
};

const CAT_LABELS = {
  karting:'Картинг и автоспорт', keramika:'Керамика и гончарное дело',
  tvorchestvo:'Художественное творчество', tancy:'Танцевальные и хореография',
  robototekhnika:'Робототехника и техн. творчество', teatr:'Театр и актёрское мастерство',
  cirk:'Цирк, акробатика и гимнастика', muzyka:'Музыкальные занятия',
  strelkovye:'Стрелковые и военно-патриотические', sport:'Спортивные секции',
  shahmaty:'Шахматы', nauka:'Естественно-научные и развивающие',
};
const CAT_EMOJI = {
  karting:'🏎️', keramika:'🏺', tvorchestvo:'🎨', tancy:'💃',
  robototekhnika:'🤖', teatr:'🎭', cirk:'🎪', muzyka:'🎵',
  strelkovye:'🎯', sport:'🏅', shahmaty:'♟️', nauka:'🔬',
};

function setMeta(sel, attr, val) {
  const el = document.querySelector(sel);
  if (el && val) el.setAttribute(attr, val);
}

function buildRelationsBlock(post) {
  const sections = [];

  // Упомянутые кружки / категории
  const circles = (post.related_circles || (post.relations && post.relations.related_circles) || '');
  const cats    = (post.related_categories || (post.relations && post.relations.related_categories) || '');
  const circleList = typeof circles === 'string' ? circles.split(',').map(s=>s.trim()).filter(Boolean) : (Array.isArray(circles) ? circles : []);
  const catList    = typeof cats === 'string'    ? cats.split(',').map(s=>s.trim()).filter(Boolean) : (Array.isArray(cats) ? cats : []);
  const allCircles = [...new Set([...catList, ...circleList])];

  if (allCircles.length) {
    const items = allCircles.map(slug => {
      const label = CAT_LABELS[slug] || slug;
      const emoji = CAT_EMOJI[slug] || '✏️';
      return `<a class="relation-item" href="/viktoria/circles.html?cat=${encodeURIComponent(slug)}">
        <span class="relation-item-emoji">${emoji}</span>
        <span>${label}</span>
        <span class="relation-item-arrow">→</span>
      </a>`;
    }).join('');
    sections.push(`<div class="relations-section">
      <div class="relations-title">Упомянутые направления</div>
      <div class="relations-list">${items}</div>
    </div>`);
  }

  // Упомянутые педагоги
  const teachers = (post.related_teachers || (post.relations && post.relations.related_teachers) || '');
  const teacherList = typeof teachers === 'string' ? teachers.split(',').map(s=>s.trim()).filter(Boolean) : (Array.isArray(teachers) ? teachers : []);
  if (teacherList.length) {
    const items = teacherList.map(slug => {
      const name = slug.split('-').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
      return `<a class="relation-item" href="/viktoria/blog.html?teacher=${encodeURIComponent(slug)}">
        <span class="relation-item-emoji">👤</span>
        <span>${name}</span>
        <span class="relation-item-arrow">→</span>
      </a>`;
    }).join('');
    sections.push(`<div class="relations-section">
      <div class="relations-title">Упомянутые педагоги</div>
      <div class="relations-list">${items}</div>
    </div>`);
  }

  // Филиал
  const subdiv = post.related_subdivision || (post.relations && post.relations.related_subdivision) || '';
  const SUBDIV_LABELS = { gazoprovod:'Газопровод', nagatinskaya:'Юный техник', annino:'Аннино', shcherbinka:'Щербинка' };
  if (subdiv && SUBDIV_LABELS[subdiv]) {
    sections.push(`<div class="relations-section">
      <div class="relations-title">Площадка</div>
      <div class="relations-list">
        <a class="relation-item" href="/viktoria/circles.html?loc=${encodeURIComponent(subdiv)}">
          <span class="relation-item-emoji">📍</span>
          <span>${SUBDIV_LABELS[subdiv]}</span>
          <span class="relation-item-arrow">→</span>
        </a>
      </div>
    </div>`);
  }

  if (!sections.length) return;
  document.getElementById('relationsWrap').innerHTML =
    '<div class="relations-block">' + sections.join('') + '</div>';
}

async function loadPost() {
  const slug = new URLSearchParams(window.location.search).get('slug');
  if (!slug) { showError('Публикация не найдена. Возможно, ссылка устарела.', false); return; }

  try {
    const res = await fetch(`https://raw.githubusercontent.com/agbox77/viktoria/main/_posts/${encodeURIComponent(slug)}.md`);
    if (res.status === 404) {
      showError('Такая публикация не найдена или была удалена.', false);
      return;
    }
    if (!res.ok) throw new Error('fetch_error');
    const text = await res.text();
    const post = parseFrontmatter(text);
    if (!post) throw new Error();

    // SEO мета-теги
    const seoTitle = (post.seo && post.seo.seo_title) || post.seo_title || post.title;
    const seoDesc  = (post.seo && post.seo.seo_description) || post.excerpt || '';
    const pageUrl  = window.location.href;

    document.getElementById('pageTitle').textContent = seoTitle + ' — ДЮЦ «Виктория»';
    setMeta('#pageDesc', 'content', seoDesc);
    setMeta('#pageCanonical', 'href', pageUrl);
    setMeta('#ogTitle', 'content', seoTitle + ' — ДЮЦ «Виктория»');
    setMeta('#ogDesc', 'content', seoDesc);
    setMeta('#ogUrl', 'content', pageUrl);
    if (post.image) setMeta('#ogImage', 'content', post.image);

    // Хлебные крошки
    const bc = document.getElementById('breadcrumb');
    document.getElementById('breadcrumbCurrent').textContent = post.title || '';
    bc.style.display = 'flex';

    const type = post.type || 'Новость';
    const tm = TYPE_MAP[type] || TYPE_MAP['Новость'];
    const tagsArr = Array.isArray(post.tags) ? post.tags : (post.tags ? String(post.tags).split(',') : []);
    const pageUrlEncoded = encodeURIComponent(pageUrl);
    const pageTitleEncoded = encodeURIComponent(post.title||'');

    const heroHtml = post.image ? `
      <div class="post-hero">
        <img src="${post.image}" alt="${post.title||''}" loading="eager">
        <div class="post-hero-overlay"></div>
        <div class="post-hero-placeholder">${tm.icon}</div>
        <div class="post-hero-content">
          <div class="post-hero-badge ${tm.cls}">${type}</div>
          <h1 class="post-hero-title">${post.title||''}</h1>
        </div>
      </div>
      <div class="post-meta-bar">
        <span>${formatDate(post.date)}</span>
        ${post.author ? `<span class="dot"></span><span>${post.author}</span>` : ''}
      </div>` : `
      <div class="post-header-simple">
        <a class="back-link" href="/viktoria/blog.html">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
          Все публикации
        </a>
        <div class="post-hero-badge ${tm.cls}" style="margin-bottom:16px">${type}</div>
        <h1 class="post-hero-title">${post.title||''}</h1>
        <div style="margin-top:14px;font-size:13px;color:var(--muted);display:flex;gap:10px;flex-wrap:wrap">
          <span>${formatDate(post.date)}</span>
          ${post.author ? `<span>·</span><span>${post.author}</span>` : ''}
        </div>
      </div>`;

    const bodyHtml = `
      <div class="post-body">
        ${post.image ? `<a class="back-link" href="/viktoria/blog.html"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>Все публикации</a>` : ''}
        ${tagsArr.length ? `<div class="post-tags">${tagsArr.map(t=>`<span class="post-tag">${t.trim()}</span>`).join('')}</div>` : ''}
        <div class="post-content">${mdToHtml(post.body)}</div>
        <div class="share-bar">
          <span class="share-label">Поделиться:</span>
          <a class="share-btn" href="https://vk.com/share.php?url=${pageUrlEncoded}" target="_blank" rel="noopener noreferrer">ВКонтакте</a>
          <a class="share-btn" href="https://t.me/share/url?url=${pageUrlEncoded}&text=${pageTitleEncoded}" target="_blank" rel="noopener noreferrer">Telegram</a>
          <button class="share-btn" onclick="navigator.clipboard.writeText(window.location.href).then(()=>{this.textContent='✓ Скопировано!'})">Скопировать ссылку</button>
        </div>
      </div>`;

    document.getElementById('loadingWrap').style.display = 'none';
    const wrap = document.getElementById('postWrap');
    wrap.style.display = 'block';
    wrap.innerHTML = heroHtml + bodyHtml;

    // Блок перелинковки
    buildRelationsBlock(post);

    // Schema.org BlogPosting
    const schema = {
      '@context': 'https://schema.org',
      '@type': post.type === 'Статья' ? 'Article' : 'NewsArticle',
      'headline': post.title || '',
      'description': seoDesc,
      'datePublished': post.date || '',
      'author': { '@type': 'Organization', 'name': 'ДЮЦ «Виктория»' },
      'publisher': { '@type': 'Organization', 'name': 'ДЮЦ «Виктория»', 'url': 'https://agbox77.github.io/viktoria/' },
    };
    if (post.image) schema.image = post.image;
    const sd = document.createElement('script');
    sd.type = 'application/ld+json';
    sd.textContent = JSON.stringify(schema);
    document.head.appendChild(sd);

  } catch(e) {
    if (e.message === 'fetch_error') {
      showError('Не удалось загрузить публикацию. Проверьте соединение и попробуйте снова.', false);
    } else {
      showError('Публикация не найдена или была удалена.', false);
    }
  }
}

function showError(msg, isNotFound) {
  document.getElementById('loadingWrap').style.display='none';
  const wrap = document.getElementById('postWrap');
  wrap.style.display='block';
  wrap.innerHTML=`
    <div class="error-wrap">
      <div style="font-size:48px;margin-bottom:16px">${isNotFound ? '📭' : '😕'}</div>
      <h2>${isNotFound ? 'Публикаций пока нет' : 'Упс!'}</h2>
      <p style="margin-bottom:24px">${msg}</p>
      <a class="back-link" href="/viktoria/blog.html" style="display:inline-flex">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
        Вернуться к публикациям
      </a>
    </div>`;
}

loadPost();
</script>
</body>
</html>
