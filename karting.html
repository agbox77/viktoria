<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Картинг — ДЮЦ «Виктория»</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap');
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

:root {
  --blue:  #1a3a6b;
  --blue2: #0d2550;
  --red:   #cc1e2e;
  --gold:  #d4a017;
  --grass: #c8d8b4;
  --panel: #f0f4ec;
  --border: rgba(26,58,107,.16);
}

html, body {
  width:100%; height:100%;
  background: var(--grass);
  font-family: 'Rajdhani', sans-serif;
  overflow: hidden;
  display: flex; align-items: center; justify-content: center;
}

/* ── OUTER SHELL ── */
#shell {
  display: flex;
  flex-direction: column;
  width: min(960px, 100vw);
  height: min(680px, 100vh);
  border-radius: 14px;
  overflow: hidden;
  background: var(--panel);
  box-shadow: 0 2px 0 rgba(255,255,255,.6) inset,
              0 10px 50px rgba(0,0,0,.28),
              0 2px 8px rgba(0,0,0,.14);
}

/* ── HUD PANEL ── */
#hud-panel {
  flex-shrink: 0;
  height: 60px;
  background: var(--panel);
  border-bottom: 2px solid var(--border);
  display: none;
  align-items: stretch;
}

/* Timer — monospaced, fixed width, never reflows */
#col-timer {
  display: flex; flex-direction: column; justify-content: center;
  padding: 0 16px;
  border-right: 1px solid var(--border);
  min-width: 148px;
}
#timer-label {
  font-family: 'Orbitron', sans-serif; font-size: 7.5px;
  letter-spacing: 2.5px; color: var(--blue); text-transform: uppercase;
  line-height: 1; margin-bottom: 3px;
}
#timer-val {
  font-family: 'Orbitron', monospace; font-size: 24px; font-weight: 900;
  color: var(--blue2); line-height: 1;
  font-variant-numeric: tabular-nums;
  width: 120px; /* hard-fixed so layout never shifts */
  letter-spacing: .5px;
}

/* Middle */
#col-mid {
  flex: 1; display: flex; align-items: center;
  justify-content: center; gap: 24px; padding: 0 12px;
}
.hud-chip { display: flex; flex-direction: column; align-items: center; }
.hud-chip-label {
  font-family: 'Orbitron', sans-serif; font-size: 7px;
  letter-spacing: 2px; color: var(--blue); text-transform: uppercase;
  margin-bottom: 2px;
}
.hud-chip-val { font-size: 17px; line-height: 1; }
#hud-logo img { height: 34px; width: auto; display: block; filter: drop-shadow(0 1px 4px rgba(26,58,107,.22)); }
#hud-logo .fb { font-family:'Orbitron',sans-serif; font-size:10px; font-weight:700; color:var(--blue); display:none; }

/* Lives */
#col-lives {
  display: flex; flex-direction: column; justify-content: center;
  align-items: flex-end; padding: 0 16px;
  border-left: 1px solid var(--border);
  min-width: 148px;
}
#lives-label {
  font-family: 'Orbitron', sans-serif; font-size: 7.5px;
  letter-spacing: 2.5px; color: var(--blue); text-transform: uppercase;
  margin-bottom: 3px;
}
#lives-val { font-size: 16px; letter-spacing: 2px; line-height: 1; }

/* ── GAME AREA ── */
#game-area {
  flex: 1; min-height: 0;
  position: relative; overflow: hidden;
}
canvas {
  display: block; width: 100%; height: 100%;
  image-rendering: optimizeSpeed;
  image-rendering: -webkit-optimize-contrast;
}

/* ── TRAFFIC LIGHT ── */
#tl {
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%,-50%);
  display: none; flex-direction: column; align-items: center;
  z-index: 9; pointer-events: none;
}
.tlb {
  background: #111; border: 3px solid #2a2a2a;
  border-radius: 16px; padding: 14px 18px;
  display: flex; flex-direction: column; gap: 10px;
  box-shadow: 0 12px 50px rgba(0,0,0,.75), 0 0 0 1px rgba(255,255,255,.04);
}
.tll { width:48px; height:48px; border-radius:50%; background:#1e1e1e; border:2px solid #333; transition: background .08s, box-shadow .08s; }
.tll.r { background:#ff2200; box-shadow:0 0 24px #ff2200, 0 0 50px #ff220044; }
.tll.g { background:#00ff55; box-shadow:0 0 24px #00ff55, 0 0 50px #00ff5544; }

/* ── START SCREEN ── */
#start-screen {
  position: absolute; inset: 0; z-index: 10;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  background: rgba(232,240,224,.95); backdrop-filter: blur(6px);
}
.ss-logo { display:flex; flex-direction:column; align-items:center; margin-bottom:26px; animation:flt 3s ease-in-out infinite; }
@keyframes flt { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
.ss-logo img { width:72px; height:auto; margin-bottom:9px; filter:drop-shadow(0 3px 10px rgba(26,58,107,.3)); }
.ss-logo h1 { font-family:'Orbitron',sans-serif; font-size:clamp(20px,3.2vw,36px); font-weight:900; letter-spacing:4px; color:var(--blue); }
.ss-sub { font-size:11px; letter-spacing:3px; color:#7a90a8; text-transform:uppercase; margin-top:5px; }
#btn-start {
  position:relative; overflow:hidden;
  padding:15px 58px; font-family:'Orbitron',sans-serif; font-size:14px; font-weight:700;
  letter-spacing:3px; text-transform:uppercase;
  color:#fff; background:var(--red); border:none; border-radius:6px; cursor:pointer;
  box-shadow:0 4px 20px rgba(204,30,46,.4), 0 1px 0 rgba(255,255,255,.18) inset;
  transition:transform .15s, box-shadow .15s;
}
#btn-start::after { content:''; position:absolute; top:-50%; left:-60%; width:35%; height:200%; background:rgba(255,255,255,.2); transform:skewX(-20deg); animation:shine 2.8s ease-in-out infinite; }
@keyframes shine { 0%,100%{left:-60%} 55%{left:120%} }
#btn-start:hover { transform:scale(1.05); box-shadow:0 6px 28px rgba(204,30,46,.55); }
#btn-start:active { transform:scale(.97); }
.ss-hint { margin-top:18px; color:#8a9eb8; font-size:11px; text-align:center; line-height:1.9; letter-spacing:1px; }

/* ── MODAL ── */
#modal {
  position:absolute; inset:0; z-index:20;
  display:none; align-items:center; justify-content:center;
  background:rgba(220,232,214,.93); backdrop-filter:blur(8px);
}
.modal-box {
  background:#fff; border:1.5px solid var(--border); border-radius:16px;
  padding:36px 44px; max-width:440px; width:90%; text-align:center;
  box-shadow:0 20px 60px rgba(0,0,0,.14);
  animation:modal-in .4s cubic-bezier(.34,1.56,.64,1);
}
@keyframes modal-in { from{transform:scale(.65);opacity:0} to{transform:scale(1);opacity:1} }
.modal-emoji { font-size:52px; display:block; margin-bottom:10px; }
.modal-box h2 { font-family:'Orbitron',sans-serif; font-size:18px; font-weight:900; color:var(--blue); margin-bottom:10px; }
.modal-box p { color:#445566; font-size:13px; line-height:1.7; margin-bottom:10px; }
#modal-time { font-family:'Orbitron',monospace; font-size:30px; color:#1a7a50; font-weight:900; margin:4px 0 12px; display:none; font-variant-numeric:tabular-nums; }
.big-cta {
  display:block; margin-top:12px; padding:12px 16px;
  font-family:'Orbitron',sans-serif; font-size:13px; font-weight:700; letter-spacing:1.5px;
  text-transform:uppercase; text-decoration:none; text-align:center;
  color:#fff; background:var(--red); border-radius:7px;
  box-shadow:0 4px 18px rgba(204,30,46,.4);
  transition:transform .15s, box-shadow .15s;
}
.big-cta:hover { transform:scale(1.03); box-shadow:0 6px 26px rgba(204,30,46,.55); }
#modal-countdown {
  font-size:11px; color:#aaa; margin-top:8px; letter-spacing:1px;
}
#btn-restart {
  margin-top:14px; padding:10px 34px;
  font-family:'Orbitron',sans-serif; font-size:11px; font-weight:700; letter-spacing:2px;
  color:var(--blue); background:transparent; border:1.5px solid var(--border); border-radius:6px; cursor:pointer;
  transition:background .15s, color .15s;
}
#btn-restart:hover { background:var(--blue); color:#fff; }

/* ── TOUCH CONTROLS ── */
#touch-ctrl {
  position:absolute; bottom:14px; left:0; right:0;
  display:none; justify-content:space-between; padding:0 18px;
  pointer-events:none; z-index:6;
}
.tb {
  width:60px; height:60px; border-radius:50%;
  background:rgba(26,58,107,.13); border:2px solid rgba(26,58,107,.25);
  display:flex; align-items:center; justify-content:center;
  font-size:20px; pointer-events:all; user-select:none; -webkit-user-select:none;
  cursor:pointer; color:var(--blue); transition:background .1s;
}
.tb.pressed, .tb:active { background:rgba(204,30,46,.28); }
.tc-left, .tc-right { display:flex; gap:10px; }
</style>
</head>
<body>
<div id="shell">

  <!-- HUD panel — physically above canvas, zero overlap -->
  <div id="hud-panel">
    <div id="col-timer">
      <div id="timer-label">Время</div>
      <div id="timer-val">0:00.00</div>
    </div>
    <div id="col-mid">
      <div class="hud-chip">
        <div class="hud-chip-label">Зрители</div>
        <div class="hud-chip-val" id="hud-fans">👐👐👐</div>
      </div>
      <div id="hud-logo">
        <img src="https://agbox77.github.io/viktoria/Victoria_logo-02.png" alt="Виктория"
             onerror="this.style.display='none';this.nextElementSibling.style.display='block'">
        <div class="fb">ДЮЦ<br>ВИКТОРИЯ</div>
      </div>
    </div>
    <div id="col-lives">
      <div id="lives-label">Жизни</div>
      <div id="lives-val">🏎️🏎️🏎️🏎️🏎️</div>
    </div>
  </div>

  <!-- Game area — canvas fills this exactly -->
  <div id="game-area">
    <canvas id="c"></canvas>

    <div id="tl">
      <div class="tlb">
        <div class="tll" id="t1"></div>
        <div class="tll" id="t2"></div>
        <div class="tll" id="t3"></div>
      </div>
    </div>

    <div id="start-screen">
      <div class="ss-logo">
        <img src="https://agbox77.github.io/viktoria/Victoria_logo-02.png" alt="" onerror="this.style.display='none'">
        <h1>Картинг</h1>
        <div class="ss-sub">ДЮЦ «Виктория» · Racing Simulator</div>
      </div>
      <button id="btn-start">НАЧАТЬ ГОНКУ</button>
      <div class="ss-hint">↑ Газ &nbsp;·&nbsp; ← → Руль &nbsp;·&nbsp; ↓ Тормоз</div>
    </div>

    <div id="modal">
      <div class="modal-box">
        <span class="modal-emoji" id="modal-emoji">🏆</span>
        <h2 id="modal-title"></h2>
        <p id="modal-text"></p>
        <div id="modal-time"></div>
        <a class="big-cta" id="modal-cta"
           href="https://agbox77.github.io/viktoria/index.html" target="_blank">
          ЗАПИСАТЬСЯ НА КАРТИНГ →
        </a>
        <div id="modal-countdown">Переход через <span id="cd-num">5</span> сек…</div>
        <button id="btn-restart">Сыграть ещё раз</button>
      </div>
    </div>

    <div id="touch-ctrl">
      <div class="tc-left">
        <div class="tb" id="bL">◀</div>
        <div class="tb" id="bR">▶</div>
      </div>
      <div class="tc-right">
        <div class="tb" id="bU">▲</div>
        <div class="tb" id="bD">▼</div>
      </div>
    </div>
  </div>

</div><!-- #shell -->
<script>
'use strict';

// ═══════════════════════════════════════════════════════════
//  AUDIO
// ═══════════════════════════════════════════════════════════
var AC = null;
function initAC() { if (!AC) AC = new (window.AudioContext || window.webkitAudioContext)(); }
function beep(f, tp, dur, vol, delay) {
  if (!AC) return; vol = vol||.4; delay = delay||0;
  var o = AC.createOscillator(), g = AC.createGain();
  o.connect(g); g.connect(AC.destination); o.type = tp; o.frequency.value = f;
  g.gain.setValueAtTime(vol, AC.currentTime + delay);
  g.gain.exponentialRampToValueAtTime(.0001, AC.currentTime + delay + dur);
  o.start(AC.currentTime + delay); o.stop(AC.currentTime + delay + dur + .05);
}
var eOsc = null, eGain = null;
function startEng() {
  if (!AC || eOsc) return;
  eOsc = AC.createOscillator(); eGain = AC.createGain();
  var ws = AC.createWaveShaper(), c = new Float32Array(256);
  for (var i = 0; i < 256; i++) { var x = i/128 - 1; c[i] = ((Math.PI+200)*x)/(Math.PI+200*Math.abs(x)); }
  ws.curve = c; eOsc.type = 'sawtooth';
  eOsc.connect(ws); ws.connect(eGain); eGain.connect(AC.destination);
  eGain.gain.value = 0; eOsc.start();
}
function updEng(s) {
  if (!eOsc) return;
  var t = Math.min(Math.abs(s) / 5.8, 1);
  eOsc.frequency.value = 75 + t * 215; eGain.gain.value = t * .1;
}
function stopEng() {
  if (!eOsc) return;
  eGain.gain.exponentialRampToValueAtTime(.0001, AC.currentTime + .3);
  eOsc.stop(AC.currentTime + .35); eOsc = null; eGain = null;
}
function sCrash() {
  if (!AC) return;
  var o = AC.createOscillator(), g = AC.createGain();
  o.connect(g); g.connect(AC.destination); o.type = 'sawtooth'; o.frequency.value = 150;
  o.frequency.exponentialRampToValueAtTime(22, AC.currentTime + .45);
  g.gain.setValueAtTime(.5, AC.currentTime); g.gain.exponentialRampToValueAtTime(.0001, AC.currentTime + .5);
  o.start(); o.stop(AC.currentTime + .55); beep(55, 'triangle', .25, .25, .07);
}
function sWin()  { [523,659,784,1047,1319].forEach(function(f,i){ beep(f,'sine',.4,.5,i*.18); }); beep(1319,'sine',.9,.65,.96); }
function sLose() { [370,290,220,160].forEach(function(f,i){ beep(f,'sawtooth',.35,.38,i*.26); }); }

// ═══════════════════════════════════════════════════════════
//  CANVAS & RESPONSIVE SETUP
// ═══════════════════════════════════════════════════════════
var cv  = document.getElementById('c');
var ctx = cv.getContext('2d');
var W = 960, H = 580; // logical resolution
var TAU = Math.PI * 2;
var RW_BASE = 58; // road half-width at base resolution
var RW = RW_BASE;

// Resize: make canvas pixel-perfect on every screen / DPR
function resizeCanvas() {
  var area   = document.getElementById('game-area');
  var rect   = area.getBoundingClientRect();
  var dpr    = window.devicePixelRatio || 1;

  // Physical pixels
  cv.width  = Math.round(rect.width  * dpr);
  cv.height = Math.round(rect.height * dpr);

  // Logical size for our drawing code
  W = rect.width;
  H = rect.height;

  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

  scaleTrack();
}

// ═══════════════════════════════════════════════════════════
//  TRACK — base coords at 960×580, then scaled
// ═══════════════════════════════════════════════════════════
// Base control points (hand-traced from the sketch image)
var CP_BASE = [
  // Right straight — S/F at CP_BASE[0]
  {x:880,y:320}, {x:880,y:210}, {x:876,y:108},
  // Top-right corner
  {x:856,y:58},  {x:798,y:30},  {x:718,y:24},
  // Top straight
  {x:596,y:22},  {x:456,y:22},  {x:316,y:24},  {x:198,y:28},
  // Top-left corner
  {x:108,y:52},  {x:66,y:108},
  // Left S-chicane
  {x:60,y:180},
  {x:68,y:242},  {x:116,y:274}, {x:158,y:297},
  {x:168,y:332}, {x:142,y:370},
  {x:78,y:410},  {x:50,y:462},  {x:66,y:514},  {x:116,y:542},
  // Bottom-left corner
  {x:194,y:558}, {x:312,y:566}, {x:458,y:566},
  {x:608,y:562}, {x:740,y:555},
  // Bottom-right corner
  {x:822,y:534}, {x:860,y:496}, {x:874,y:438}, {x:876,y:382},
];

var CP = CP_BASE.map(function(p){ return {x:p.x, y:p.y}; });
var CL = [], NP = 0, OW = [], IW = [], WL = {};

// Scale track to fit current canvas, preserving aspect ratio
function scaleTrack() {
  var scaleX = W / 960;
  var scaleY = H / 580;
  var scale  = Math.min(scaleX, scaleY);
  var offX   = (W - 960 * scale) / 2;
  var offY   = (H - 580 * scale) / 2;

  CP = CP_BASE.map(function(p) {
    return { x: p.x * scale + offX, y: p.y * scale + offY };
  });

  RW = RW_BASE * scale;
  CL = catmull(CP, 20);
  NP = CL.length;
  WL = buildWalls(RW);
  OW = WL.out; IW = WL.inn;

  // Update S/F references (still used for car start position)
  rebuildSF();

  // Build checkpoint ring
  buildCheckpoints();

  // Update car start if not yet in game
  if (gstate === 'start') {
    SX = CL[SFI].x; SY = CL[SFI].y;
    SA = Math.atan2(CL[(SFI+1)%NP].y - CL[SFI].y, CL[(SFI+1)%NP].x - CL[SFI].x);
    resetCar();
  }
}

// ── CHECKPOINTS ────────────────────────────────────────────
// Evenly-spaced gates around the entire centre-line.
// The car must pass them all IN ORDER before the lap is complete.
// First checkpoint is placed ~1/N ahead of the start so the car
// must actually travel the whole track before "returning" to CP 0.
var checkpoints = [];
var cpRadius  = 0;   // trigger radius — scales with RW
var cpCurrent = 0;   // index of next checkpoint to hit

function buildCheckpoints() {
  checkpoints = [];
  var N     = 16;                        // number of gates
  var step  = Math.floor(NP / N);
  // Start one step ahead of SFI so CP[0] is NOT at the start line
  var start = (SFI + step) % NP;

  for (var i = 0; i < N; i++) {
    var idx = (start + i * step) % NP;
    checkpoints.push({ x: CL[idx].x, y: CL[idx].y });
  }
  cpRadius  = RW * 0.95;   // generous — car just needs to be on-road near gate
  cpCurrent = 0;
}

// Catmull-Rom (closed)
function catmull(pts, sps) {
  var n = pts.length, res = [];
  for (var i = 0; i < n; i++) {
    var p0=pts[(i-1+n)%n], p1=pts[i], p2=pts[(i+1)%n], p3=pts[(i+2)%n];
    for (var t = 0; t < sps; t++) {
      var s=t/sps, s2=s*s, s3=s2*s;
      res.push({
        x:.5*((2*p1.x)+(-p0.x+p2.x)*s+(2*p0.x-5*p1.x+4*p2.x-p3.x)*s2+(-p0.x+3*p1.x-3*p2.x+p3.x)*s3),
        y:.5*((2*p1.y)+(-p0.y+p2.y)*s+(2*p0.y-5*p1.y+4*p2.y-p3.y)*s2+(-p0.y+3*p1.y-3*p2.y+p3.y)*s3)
      });
    }
  }
  return res;
}

function buildWalls(hw) {
  var out=[], inn=[];
  for (var i=0; i<NP; i++) {
    var prev=CL[(i-1+NP)%NP], next=CL[(i+1)%NP];
    var dx=next.x-prev.x, dy=next.y-prev.y, len=Math.hypot(dx,dy)||1;
    var nx=-dy/len*hw, ny=dx/len*hw;
    out.push({x:CL[i].x+nx, y:CL[i].y+ny});
    inn.push({x:CL[i].x-nx, y:CL[i].y-ny});
  }
  return {out:out, inn:inn};
}

// ── Collision: optimised nearest-segment with spatial locality ──
var lastIdx = 0;
function nearestDist(px, py) {
  var best = 1e9, bestIdx = lastIdx;
  // First pass: check neighbourhood (fast path)
  var radius = 60, step = 1;
  for (var ii = -radius; ii <= radius; ii += step) {
    var i = (lastIdx + ii + NP) % NP;
    var a = CL[i], b = CL[(i+1)%NP];
    var dx=b.x-a.x, dy=b.y-a.y, ll=dx*dx+dy*dy;
    if (ll < .01) continue;
    var t = Math.max(0, Math.min(1, ((px-a.x)*dx+(py-a.y)*dy)/ll));
    var cx=a.x+t*dx, cy=a.y+t*dy;
    var d=(px-cx)*(px-cx)+(py-cy)*(py-cy);
    if (d < best) { best=d; bestIdx=i; }
  }
  // Fallback full scan only if nearest is suspiciously far (teleport / resize)
  if (best > RW * RW * 4) {
    for (var i=0; i<NP; i++) {
      var a=CL[i], b=CL[(i+1)%NP];
      var dx=b.x-a.x, dy=b.y-a.y, ll=dx*dx+dy*dy;
      if (ll<.01) continue;
      var t=Math.max(0,Math.min(1,((px-a.x)*dx+(py-a.y)*dy)/ll));
      var cx=a.x+t*dx, cy=a.y+t*dy;
      var d=(px-cx)*(px-cx)+(py-cy)*(py-cy);
      if (d<best){best=d;bestIdx=i;}
    }
  }
  lastIdx = bestIdx;
  return Math.sqrt(best);
}
function onTrack(px, py) { return nearestDist(px,py) < RW - 6; }

// ── Start / Finish ──────────────────────────────────────────
var SFI = 0, sfA, sfB, sfDX, sfDY, sfLen, sfNX, sfNY;
var SX, SY, SA;

function rebuildSF() {
  // Find CL point closest to scaled CP[0]
  var best = 1e9;
  for (var i=0; i<NP; i++) {
    var d = Math.hypot(CL[i].x-CP[0].x, CL[i].y-CP[0].y);
    if (d < best) { best=d; SFI=i; }
  }
  sfA = CL[SFI]; sfB = CL[(SFI+1)%NP];
  sfDX=sfB.x-sfA.x; sfDY=sfB.y-sfA.y;
  sfLen = Math.hypot(sfDX,sfDY)||1;
  sfNX = -sfDY/sfLen; sfNY = sfDX/sfLen;
  SX=sfA.x; SY=sfA.y;
  SA=Math.atan2(sfDY, sfDX);
}

// ═══════════════════════════════════════════════════════════
//  DRAW
// ═══════════════════════════════════════════════════════════
function polyPath(pts) {
  ctx.beginPath(); ctx.moveTo(pts[0].x, pts[0].y);
  for (var i=1; i<pts.length; i++) ctx.lineTo(pts[i].x, pts[i].y);
  ctx.closePath();
}

function drawBackground() {
  ctx.fillStyle = '#c4d4b0'; ctx.fillRect(0,0,W,H);
  var sq = 26;
  for (var x=0; x<W; x+=sq) for (var y=0; y<H; y+=sq) {
    if ((Math.floor(x/sq)+Math.floor(y/sq))%2===0) {
      ctx.fillStyle='rgba(160,198,130,.45)'; ctx.fillRect(x,y,sq,sq);
    }
  }
  // edge vignette
  var vg = ctx.createRadialGradient(W/2,H/2,H*.3,W/2,H/2,W*.72);
  vg.addColorStop(0,'rgba(0,0,0,0)'); vg.addColorStop(1,'rgba(0,0,0,.07)');
  ctx.fillStyle=vg; ctx.fillRect(0,0,W,H);
}

function drawRoad() {
  // Shadow
  ctx.save();
  ctx.shadowColor='rgba(0,0,0,.28)'; ctx.shadowBlur=14; ctx.shadowOffsetY=4;
  polyPath(OW); ctx.fillStyle='#363640'; ctx.fill();
  ctx.restore();
  // Asphalt
  polyPath(OW);
  var ag=ctx.createLinearGradient(0,0,W,H);
  ag.addColorStop(0,'#565664'); ag.addColorStop(.5,'#4e4e5c'); ag.addColorStop(1,'#525262');
  ctx.fillStyle=ag; ctx.fill();
  // Kerbs outer
  for (var i=0; i<NP; i++) {
    ctx.strokeStyle = Math.floor(i/5)%2===0 ? '#dd2200' : '#f0f0f0';
    ctx.lineWidth=10; ctx.lineCap='butt';
    ctx.beginPath(); ctx.moveTo(OW[i].x,OW[i].y); ctx.lineTo(OW[(i+1)%NP].x,OW[(i+1)%NP].y); ctx.stroke();
  }
  // Kerbs inner
  for (var i=0; i<NP; i++) {
    ctx.strokeStyle = Math.floor(i/5)%2===0 ? '#dd2200' : '#f0f0f0';
    ctx.lineWidth=10; ctx.lineCap='butt';
    ctx.beginPath(); ctx.moveTo(IW[i].x,IW[i].y); ctx.lineTo(IW[(i+1)%NP].x,IW[(i+1)%NP].y); ctx.stroke();
  }
  // Borders
  ctx.lineWidth=3; ctx.strokeStyle='rgba(18,18,32,.5)';
  polyPath(OW); ctx.stroke(); polyPath(IW); ctx.stroke();
  // Centre dashes
  ctx.save();
  ctx.setLineDash([24,24]); ctx.strokeStyle='rgba(255,255,180,.38)'; ctx.lineWidth=2.5;
  ctx.beginPath(); ctx.moveTo(CL[0].x,CL[0].y);
  for (var i=1; i<NP; i++) ctx.lineTo(CL[i].x,CL[i].y);
  ctx.closePath(); ctx.stroke();
  ctx.setLineDash([]); ctx.restore();
  drawSF();
}

function drawSF() {
  var dx=sfDX/sfLen, dy=sfDY/sfLen, sq=9, cnt=Math.floor(RW*2/sq);
  for (var i=0; i<cnt; i++) for (var j=0; j<3; j++) {
    var f=(i+.5)/cnt;
    var cx2=sfA.x+sfNX*(RW-f*RW*2)+(j-1)*dx*sq;
    var cy2=sfA.y+sfNY*(RW-f*RW*2)+(j-1)*dy*sq;
    ctx.fillStyle=(i+j)%2===0?'#fff':'#111';
    ctx.save(); ctx.translate(cx2,cy2); ctx.rotate(Math.atan2(sfDY,sfDX));
    ctx.fillRect(-sq/2,-sq/2,sq,sq); ctx.restore();
  }
}

function drawScenery() {
  // PIT LANE sign — bottom-right corner, outside track
  var scale = Math.min(W/960, H/580);
  var px = W - 166 * scale, py = H - 50 * scale;
  var bw = 148*scale, bh = 40*scale;
  ctx.fillStyle='rgba(255,255,255,.92)';
  ctx.strokeStyle='rgba(26,58,107,.38)'; ctx.lineWidth=2;
  roundRect(px,py,bw,bh,7*scale); ctx.fill(); ctx.stroke();
  ctx.fillStyle='#cc1e2e'; ctx.font='bold '+Math.round(11*scale)+'px Orbitron,monospace'; ctx.textAlign='center';
  ctx.fillText('PIT LANE', px+bw/2, py+bh*.36);
  ctx.fillStyle='#1a3a6b'; ctx.font='bold '+Math.round(9*scale)+'px Rajdhani,sans-serif';
  ctx.fillText('ДЮЦ «Виктория»', px+bw/2, py+bh*.76);

  // Tire stacks
  tirePile(26*scale, 26*scale);
  tirePile(W-26*scale, 26*scale);
  tirePile(26*scale, H-26*scale);
  tirePile(26*scale, H*.55);
  tirePile(26*scale, H*.62);
}

function drawCheckpoints() {
  if (gstate === 'start' || gstate === 'countdown') return;
  for (var i = 0; i < checkpoints.length; i++) {
    if (i < cpCurrent) continue;           // already cleared — invisible
    var cp   = checkpoints[i];
    var next = (i === cpCurrent);
    ctx.save();
    ctx.globalAlpha = next ? 0.55 : 0.18;
    ctx.strokeStyle = next ? '#f0c040' : '#aabbcc';
    ctx.lineWidth   = next ? 3 : 1.5;
    ctx.setLineDash(next ? [] : [4, 4]);
    ctx.beginPath(); ctx.arc(cp.x, cp.y, cpRadius * 0.55, 0, TAU); ctx.stroke();
    ctx.setLineDash([]);
    if (next) {
      ctx.fillStyle = '#f0c040'; ctx.globalAlpha = 0.65;
      ctx.beginPath(); ctx.arc(cp.x, cp.y, 4, 0, TAU); ctx.fill();
    }
    ctx.restore();
  }
}

function roundRect(x,y,w,h,r) {
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r); ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx.lineTo(x+r,y+h); ctx.arcTo(x,y+h,x,y+h-r,r);
  ctx.lineTo(x,y+r); ctx.arcTo(x,y,x+r,y,r); ctx.closePath();
}

function tirePile(x,y) {
  var r = Math.max(7, RW*.13);
  for (var i=2; i>=0; i--) {
    ctx.fillStyle='#1e1e1e'; ctx.beginPath(); ctx.arc(x,y-i*r*1.2,r,0,TAU); ctx.fill();
    ctx.strokeStyle='#3a3a3a'; ctx.lineWidth=1.5; ctx.stroke();
    ctx.fillStyle='#cc2200'; ctx.beginPath(); ctx.arc(x,y-i*r*1.2,r*.38,0,TAU); ctx.fill();
  }
}

// ═══════════════════════════════════════════════════════════
//  CAR
// ═══════════════════════════════════════════════════════════
var car = { x:0,y:0,angle:0, speed:0,vx:0,vy:0, lives:5, crashed:false,crashTimer:0, lapDone:false,crossed:false };

function resetCar() {
  car.x=SX; car.y=SY; car.angle=SA;
  car.speed=0; car.vx=0; car.vy=0;
  car.crashed=false; car.crashTimer=0;
  car.lapDone=false; car.crossed=false;
  sfSide=null; lapPhase=0; lastIdx=SFI;
  cpCurrent=0; // reset checkpoint progress
}

function drawCar(x,y,angle,flash) {
  if (flash && Math.floor(Date.now()/75)%2===0) return;
  var s = Math.min(W/960, H/580); // scale car with track
  ctx.save(); ctx.translate(x,y); ctx.rotate(angle); ctx.scale(s,s);

  ctx.save(); ctx.translate(4,5); ctx.fillStyle='rgba(0,0,0,.2)';
  ctx.beginPath(); ctx.ellipse(0,0,18,10,0,0,TAU); ctx.fill(); ctx.restore();

  var bg=ctx.createLinearGradient(-20,-8,20,8);
  bg.addColorStop(0,'#1a3a6b'); bg.addColorStop(.5,'#2563a8'); bg.addColorStop(1,'#0d2550');
  ctx.fillStyle=bg;
  ctx.beginPath(); ctx.moveTo(-21,-7); ctx.lineTo(16,-6); ctx.lineTo(20,0); ctx.lineTo(16,6); ctx.lineTo(-21,7); ctx.closePath(); ctx.fill();

  ctx.fillStyle='#cc1e2e'; ctx.fillRect(-15,-2,30,4);
  ctx.fillStyle='#030d22'; ctx.beginPath(); ctx.ellipse(2,0,8,5,0,0,TAU); ctx.fill();
  ctx.fillStyle='#f0c040'; ctx.beginPath(); ctx.arc(2,0,3.5,0,TAU); ctx.fill();
  ctx.strokeStyle='#d4a017'; ctx.lineWidth=.8; ctx.stroke();

  ctx.fillStyle='#cc1e2e';
  ctx.fillRect(13,-9,7,4); ctx.fillRect(13,5,7,4);
  ctx.fillRect(-25,-9,6,4); ctx.fillRect(-25,5,6,4);

  [[-12,-9],[6,-9],[-12,9],[6,9]].forEach(function(w){
    ctx.fillStyle='#1a1a1a'; ctx.beginPath(); ctx.ellipse(w[0],w[1],5,3.5,0,0,TAU); ctx.fill();
    ctx.strokeStyle='#555'; ctx.lineWidth=.8; ctx.stroke();
  });

  ctx.fillStyle='#f0c040'; ctx.font='bold 8px Orbitron,monospace'; ctx.textAlign='center';
  ctx.fillText('V',-6,4);
  ctx.restore();
}

// ═══════════════════════════════════════════════════════════
//  PHYSICS
// ═══════════════════════════════════════════════════════════
var KEYS={}, TOUCH={};
var MAX_SPD=5.8, ACCEL=.17, BRAKE=.22, FRIC=.975;

function updateCar(dt) {
  if (car.lapDone) return;
  if (car.crashed) {
    car.crashTimer-=dt; updEng(0);
    if (car.crashTimer<=0) { car.crashed=false; car.speed*=.1; }
    return;
  }
  var up  = KEYS['ArrowUp']   ||KEYS['KeyW']||TOUCH.up;
  var dn  = KEYS['ArrowDown'] ||KEYS['KeyS']||TOUCH.down;
  var lt  = KEYS['ArrowLeft'] ||KEYS['KeyA']||TOUCH.left;
  var rt  = KEYS['ArrowRight']||KEYS['KeyD']||TOUCH.right;

  if (up) car.speed = Math.min(car.speed+ACCEL, MAX_SPD);
  if (dn) car.speed = Math.max(car.speed-BRAKE, -2);
  if (!up&&!dn) car.speed *= FRIC;

  var steer = .058*(Math.min(Math.abs(car.speed),MAX_SPD)/MAX_SPD*.65+.35);
  if (lt) car.angle -= steer;
  if (rt) car.angle += steer;

  car.vx=Math.cos(car.angle)*car.speed; car.vy=Math.sin(car.angle)*car.speed;
  car.x+=car.vx; car.y+=car.vy;
  updEng(car.speed);

  if (!onTrack(car.x,car.y)) {
    car.x-=car.vx*2.8; car.y-=car.vy*2.8; car.speed*=-.28;
    if (!car.crashed) {
      car.lives--;
      car.crashed=true; car.crashTimer=1100;
      sCrash(); spawnSparks(car.x,car.y); updateLivesHUD();
      if (car.lives<=0) endGame(false);
    }
  }
  checkLap();
}

// ── LAP DETECTION — CHECKPOINT SYSTEM ─────────────────────
//
//  Industry-standard approach: car must pass N evenly-spaced gates
//  in order around the track. No finish-line crossing bugs possible.
//
//  • Checkpoints are placed starting ONE step AHEAD of the start,
//    so the car must travel the full circuit before triggering CP[0].
//  • Speed guard < 0.5 prevents slow-roll / reverse exploits.
//  • cpCurrent is reset to 0 in resetCar().

function checkLap() {
  if (Math.abs(car.speed) < 0.5) return;          // must be moving
  if (cpCurrent >= checkpoints.length) return;     // already done

  var cp   = checkpoints[cpCurrent];
  var dist = Math.hypot(car.x - cp.x, car.y - cp.y);

  if (dist < cpRadius) {
    cpCurrent++;

    if (cpCurrent >= checkpoints.length) {
      // All checkpoints cleared — lap complete!
      car.lapDone = true;
      endGame(true);
    }
  }
}

// Legacy vars kept so resetCar / beginRace don't break
var sfSide = null;
var lapPhase = 0;

// ═══════════════════════════════════════════════════════════
//  PARTICLES
// ═══════════════════════════════════════════════════════════
var PARTS=[];
function spawnSparks(x,y) {
  for (var i=0;i<14;i++) {
    var a=Math.random()*TAU, s=1.5+Math.random()*4.5;
    PARTS.push({x:x,y:y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:1,col:'hsl('+(18+Math.random()*44)+',100%,55%)'});
  }
}
function updParts(dt) {
  for (var i=PARTS.length-1;i>=0;i--) {
    var p=PARTS[i]; p.x+=p.vx; p.y+=p.vy; p.vy+=.1; p.life-=dt/500;
    if (p.life<=0) PARTS.splice(i,1);
  }
}
function drawParts() {
  PARTS.forEach(function(p){
    ctx.save(); ctx.globalAlpha=p.life; ctx.fillStyle=p.col;
    ctx.beginPath(); ctx.arc(p.x,p.y,3*p.life,0,TAU); ctx.fill(); ctx.restore();
  });
}

// ═══════════════════════════════════════════════════════════
//  HUD
// ═══════════════════════════════════════════════════════════
function updateLivesHUD() {
  var s='';
  for (var i=0;i<Math.max(0,car.lives);i++) s+='🏎️';
  for (var i=0;i<Math.max(0,5-car.lives);i++) s+='💀';
  document.getElementById('lives-val').textContent=s;
}

var fansT=0, fansI=0;
var FF=['👏👏👏','🙌👏🙌','👏🙌👏','🎉👏🎉','👏🎉👏'];
function updateFans(dt) {
  fansT+=dt;
  if (fansT>320) {
    fansT=0; fansI=(fansI+1)%FF.length;
    var spd=Math.abs(car.speed);
    var el=document.getElementById('hud-fans');
    if (spd<0.5) el.textContent='👐👐👐';
    else if (spd<3) el.textContent=FF[fansI];
    else el.textContent='🔥'+FF[fansI]+'🔥';
  }
}

function fmt(ms) {
  var m=Math.floor(ms/60000), s=Math.floor((ms%60000)/1000), cs=Math.floor((ms%1000)/10);
  return m+':'+(s<10?'0':'')+s+'.'+(cs<10?'0':'')+cs;
}

// ═══════════════════════════════════════════════════════════
//  GAME STATE
// ═══════════════════════════════════════════════════════════
var running=false, timerOn=false, t0=0, elapsed=0, gstate='start';
var cdInterval=null;

function startCountdown() {
  gstate='countdown';
  document.getElementById('start-screen').style.display='none';
  document.getElementById('hud-panel').style.display='flex';
  document.getElementById('tl').style.display='flex';
  var tl1=document.getElementById('t1'), tl2=document.getElementById('t2'), tl3=document.getElementById('t3');
  setTimeout(function(){ tl1.className='tll r'; beep(440,'square',.16,.45); },300);
  setTimeout(function(){ tl2.className='tll r'; beep(440,'square',.16,.45); },1300);
  setTimeout(function(){ tl3.className='tll r'; beep(440,'square',.16,.45); },2300);
  setTimeout(function(){
    tl1.className='tll g'; tl2.className='tll g'; tl3.className='tll g';
    beep(900,'square',.42,.7);
    setTimeout(function(){ document.getElementById('tl').style.display='none'; },700);
    beginRace();
  },3400);
}

function beginRace() {
  gstate='playing'; running=true;
  t0=performance.now(); timerOn=true;
  sfSide=null; lapPhase=0; car.crossed=false;
  startEng();
  if ('ontouchstart' in window) document.getElementById('touch-ctrl').style.display='flex';
}

function endGame(won) {
  running=false; timerOn=false; gstate='over'; stopEng();

  // Determine message — "nearFinish" = passed at least half the checkpoints
  var nearFinish = cpCurrent >= Math.floor(checkpoints.length / 2);
  var emoji, title, body;
  if (won) {
    emoji='🏆'; title='Отличный заезд!';
    body='Ты прошёл круг за '+fmt(elapsed)+' — это результат!';
    document.getElementById('modal-time').textContent=fmt(elapsed);
    document.getElementById('modal-time').style.display='block';
    sWin();
  } else if (nearFinish) {
    emoji='💨'; title='Почти получилось!';
    body='Ты был так близко к финишу. Попробуй на настоящем картинге — там ты точно справишься!';
    document.getElementById('modal-time').style.display='none';
    sLose();
  } else {
    emoji='💥'; title='Попробуй ещё раз!';
    body='Не расстраивайся — профессионалы тоже учились. Приходи на настоящий картинг!';
    document.getElementById('modal-time').style.display='none';
    sLose();
  }

  document.getElementById('modal-emoji').textContent=emoji;
  document.getElementById('modal-title').textContent=title;
  document.getElementById('modal-text').textContent=body;

  // Auto-redirect countdown
  var secs=5;
  document.getElementById('cd-num').textContent=secs;
  clearInterval(cdInterval);
  cdInterval=setInterval(function(){
    secs--;
    document.getElementById('cd-num').textContent=secs;
    if (secs<=0) {
      clearInterval(cdInterval);
      window.open('https://agbox77.github.io/viktoria/index.html','_blank');
    }
  },1000);

  setTimeout(function(){ document.getElementById('modal').style.display='flex'; }, won?700:350);
}

function restart() {
  clearInterval(cdInterval);
  document.getElementById('modal').style.display='none';
  document.getElementById('touch-ctrl').style.display='none';
  document.getElementById('hud-panel').style.display='none';
  document.getElementById('tl').style.display='none';
  ['t1','t2','t3'].forEach(function(id){ document.getElementById(id).className='tll'; });
  PARTS.length=0; elapsed=0;
  document.getElementById('timer-val').textContent='0:00.00';
  car.lives=5; updateLivesHUD();
  document.getElementById('hud-fans').textContent='👐👐👐';
  resetCar(); startCountdown();
}

// ═══════════════════════════════════════════════════════════
//  MAIN LOOP — FPS-capped at 60
// ═══════════════════════════════════════════════════════════
var lastT=0;
var FRAME_MS = 1000/60;

function loop(now) {
  requestAnimationFrame(loop);
  var dt = now - lastT;
  if (dt < FRAME_MS - 1) return; // skip frame if too soon
  dt = Math.min(dt, 50); lastT=now;

  if (timerOn) {
    elapsed=now-t0;
    document.getElementById('timer-val').textContent=fmt(elapsed);
  }
  if (running) { updateCar(dt); updParts(dt); updateFans(dt); }

  ctx.clearRect(0,0,W,H);
  drawBackground();
  drawScenery();
  drawRoad();
  drawCheckpoints();
  drawParts();

  if (gstate!=='start') {
    // Speed streaks
    if (Math.abs(car.speed)>3.6) {
      ctx.save();
      ctx.globalAlpha=(Math.abs(car.speed)-3.6)/MAX_SPD*.16;
      ctx.strokeStyle='rgba(40,40,80,.65)'; ctx.lineWidth=1;
      for (var i=0;i<4;i++) {
        var sx=car.x-Math.cos(car.angle)*(26+i*13)+(Math.random()-.5)*8;
        var sy=car.y-Math.sin(car.angle)*(26+i*13)+(Math.random()-.5)*8;
        ctx.beginPath(); ctx.moveTo(sx,sy);
        ctx.lineTo(sx-Math.cos(car.angle)*(6+i*4),sy-Math.sin(car.angle)*(6+i*4));
        ctx.stroke();
      }
      ctx.restore();
    }
    drawCar(car.x,car.y,car.angle,car.crashed);
  }
}

// ═══════════════════════════════════════════════════════════
//  INPUT
// ═══════════════════════════════════════════════════════════
window.addEventListener('keydown',function(e){
  KEYS[e.code]=true;
  if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].indexOf(e.code)>-1) e.preventDefault();
});
window.addEventListener('keyup',function(e){ KEYS[e.code]=false; });

[['bL','left'],['bR','right'],['bU','up'],['bD','down']].forEach(function(pair){
  var btn=document.getElementById(pair[0]), dir=pair[1];
  function on(){ TOUCH[dir]=true; btn.classList.add('pressed'); }
  function off(){ TOUCH[dir]=false; btn.classList.remove('pressed'); }
  btn.addEventListener('touchstart',function(e){ e.preventDefault(); on(); },{passive:false});
  btn.addEventListener('touchend',  function(e){ e.preventDefault(); off(); },{passive:false});
  btn.addEventListener('mousedown',on);
  btn.addEventListener('mouseup',off);
  btn.addEventListener('mouseleave',off);
});

document.getElementById('btn-start').addEventListener('click',function(){
  initAC(); AC.resume(); car.lives=5; updateLivesHUD(); resetCar(); startCountdown();
});
document.getElementById('btn-restart').addEventListener('click',function(){
  if(AC) AC.resume(); restart();
});
document.getElementById('modal-cta').addEventListener('click',function(){
  clearInterval(cdInterval);
});

// ═══════════════════════════════════════════════════════════
//  BOOT
// ═══════════════════════════════════════════════════════════
window.addEventListener('resize', resizeCanvas);
resizeCanvas(); // sets W, H, scales track, calls rebuildSF + resetCar
requestAnimationFrame(loop);
</script>
