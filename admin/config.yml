backend:
  name: github
  repo: agbox77/viktoria
  branch: main
  base_url: https://viktoria-cms-auth.sergienkoalvl.workers.dev
  auth_endpoint: auth/github

media_folder: static/images
public_folder: /static/images

collections:
  - name: circles
    label: Кружки
    label_singular: Кружок
    folder: _data/circles
    create: true
    slug: "{{slug}}"
    fields:
      - { name: title, label: Название, widget: string }
      - { name: category, label: Категория, widget: string }
      - { name: age, label: Возраст, widget: string }
      - { name: address, label: Адрес, widget: string }
      - { name: teacher, label: Педагог, widget: string }
      - { name: link, label: Ссылка на запись, widget: string }
