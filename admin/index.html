<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Админка — Виктория</title>

  <style>
    /* Кнопка "На сайт" */
    .back-button {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #1a3a6b;
      color: #f0c060;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      text-decoration: none;
      font-family: sans-serif;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
      transition: all 0.2s ease;
      z-index: 1000;
    }

    .back-button:hover {
      opacity: 0.9;
      transform: translateY(-1px);
    }
  </style>
</head>

<body>

  <!-- Кнопка -->
  <a class="back-button" href="https://agbox77.github.io/viktoria/" target="_blank">
    ← На сайт
  </a>

  <!-- CMS -->
  <script src="https://unpkg.com/@sveltia/cms@latest/dist/sveltia-cms.js"></script>

</body>
</html>
